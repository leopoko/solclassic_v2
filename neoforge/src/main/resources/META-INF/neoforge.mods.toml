modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"

[[mods]]
modId = "solclassic"
version = "${version}"
displayName = "Spice of Life: Classic Edition"
authors = "leopoko"
description = '''
Eating the same food will cause the recovery level to decrease.
'''
logoFile = "icon.png"

[[mixins]]
config = "solclassic-neoforge.mixins.json"

[[mixins]]
config = "solclassic.mixins.json"

[[mixins]]
config = "solclassic-sb-compat.mixins.json"

[[dependencies.solclassic]]
modId = "neoforge"
mandatory = true
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.solclassic]]
modId = "minecraft"
mandatory = true
versionRange = "[1.21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.solclassic]]
modId = "architectury"
mandatory = true
versionRange = "[13,)"
ordering = "AFTER"
side = "BOTH"

[modproperties.solclassic]
catalogueImageIcon="icon.png"
catalogueBackground="catalogue_background_sol.png"
configuredBackground="minecraft:textures/block/cobblestone.png"
